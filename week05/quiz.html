<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML and CSS Quiz | WDD 130</title>
    <meta name="description" content="A simple quiz form about HTML and CSS for WDD 130: Web Fundamentals.">
    <meta name="author" content="Nyasha Chimutapira">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <header>
        <h1>HTML/CSS Quiz</h1>
    </header>
    <main>
        <form action="#" method="post">
            <fieldset>
                <div class="form-item">
                    <label for="q1">1. What does the acronym HTML stand for?</label>
                    <input type="text" id="q1" name="q1" required>
                </div>

                <div class="form-item">
                    <label for="q2">2. Explain the difference between an ID and a Class in CSS.</label>
                    <textarea id="q2" name="q2" rows="4" required></textarea>
                </div>

                <div class="form-item">
                    <label for="q3">3. Which HTML element is used to define the most important heading?</label>
                    <select id="q3" name="q3" required>
                        <option value="" selected disabled>Choose One ...</option>
                        <option value="h1">&lt;h1&gt;</option>
                        <option value="head">&lt;head&gt;</option>
                        <option value="header">&lt;header&gt;</option>
                        <option value="title">&lt;title&gt;</option>
                    </select>
                </div>

                <div class="form-item">
                    <label for="q4">4. How many levels of headings are available in HTML?</label>
                    <input type="number" id="q4" name="q4" min="1" max="10" required>
                </div>
            </fieldset>

            <button type="submit">Submit Quiz</button>
        </form>
    </main>
    <footer>
        <p>&copy; 2026 | Nyasha Chimutapira | WDD 130</p>
    </footer>
</body>
</html>
