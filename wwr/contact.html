<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting Adventures</title>
    <meta name="description"
      content="Get in touch with White Water Rafting Adventures. Contact us for inquiries, reservations, and suggestions regarding our white water rafting trips in Idaho.">
    <meta name="author" content="Nyasha Chimutapira">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo1.png" alt="White Water Rafting Company Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="hero">
            <img src="images/hero.jpg" alt="White water rafting adventure on scenic river">
            <h1>Contact Us</h1>
        </div>

        <section class="contact-info">
            <div class="company-details">
                <h2>Our Location</h2>
                <p><strong>Address:</strong> 123 River Road, Riggins, ID 83549</p>
                <p><strong>Phone:</strong> (208) 555-0123</p>
                <p><strong>Email:</strong> info@raftingadventures.pro</p>
            </div>
            <div class="map">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2836.467362035251!2d-116.3155796!3d45.4223194!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x54a0a52f4cda1e17%3A0x6bba84793f0b2f1e!2sRiggins%2C%20ID%2083549!5e0!3m2!1sen!2sus!4v1711818000000!5m2!1sen!2sus" 
                    width="600" 
                    height="450" 
                    loading="lazy" 
                    title="Google Map showing company location in Riggins, Idaho">
                </iframe>
            </div>
        </section>

        <section class="employees">
            <h2>Meet Our Team</h2>
            <div class="employee-grid">
                <figure>
                    <img src="images/john.png" alt="John Smith, Lead Guide">
                    <figcaption>John Smith - Lead Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/jane.png" alt="Jane Doe, Safety Officer">
                    <figcaption>Jane Doe - Safety Officer</figcaption>
                </figure>
                <figure>
                    <img src="images/client1.jpg" alt="Bob Johnson, Customer Relations Manager">
                    <figcaption>Bob Johnson - Customer Relations</figcaption>
                </figure>
            </div>
        </section>

        <section class="contact-form">
            <h2>Send Us a Message</h2>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="user_name">Full Name:</label>
                    <input type="text" id="user_name" name="user_name" required>
                </div>

                <div class="form-group">
                    <label for="user_email">Email Address:</label>
                    <input type="email" id="user_email" name="user_email" required>
                </div>

                <div class="form-group radio-group">
                    <p>Purpose of Message:</p>
                    <label>
                        <input type="radio" name="purpose" value="general" checked> General Inquiry
                    </label>
                    <label>
                        <input type="radio" name="purpose" value="reservation"> Reservation Question
                    </label>
                    <label>
                        <input type="radio" name="purpose" value="suggestion"> Website Suggestion
                    </label>
                </div>

                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>

                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" name="subscribe" value="yes"> Please subscribe me to the monthly newsletter
                    </label>
                </div>

                <button type="submit">Send Inquiry</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 White Water Rafting Adventures | Nyasha Chimutapira</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
