<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Victoria Falls White Water Rafting</title>
    <meta name="description"
        content="Get in touch with Zimbabwe White Water Rafting Adventures. Contact us for inquiries, reservations, and suggestions regarding our world-class rafting trips in Victoria Falls.">
    <meta name="author" content="Nyasha Chimutapira">
    <link rel="stylesheet" href="styles/rafting.css?v=2">
</head>

<body>
    <header>
        <div class="container">
            <img src="images/logo1.png" alt="White Water Rafting Company Logo">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="trips.html">Trips</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="company-head">
            <h1>Zimbabwe White Water Rafting Company</h1>
            <p>123 River Drive</p>
            <p>Victoria Falls, Zimbabwe</p>
            <p>+263 77 999 9999</p>
            <p>info@vicfallsrafting.zw</p>
        </section>

        <section class="contact-grid">
            <div class="map">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15194.88725845!2d25.8284568!3d-17.9244439!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1945699478f99e97%3A0xc319acc77aef9845!2sVictoria%20Falls!5e0!3m2!1sen!2szw!4v1711818000000!5m2!1sen!2szw"
                    width="600" height="450" loading="lazy" title="Google Map showing Victoria Falls, Zimbabwe">
                </iframe>
            </div>
            <div class="form-container">
                <form action="#" method="post">
                    <div class="form-group">
                        <label for="user_name">Name</label>
                        <input type="text" id="user_name" name="user_name" placeholder="Your Name" required>
                    </div>

                    <div class="form-group">
                        <label for="user_email">Email</label>
                        <input type="email" id="user_email" name="user_email" placeholder="Your Email" required>
                    </div>

                    <div class="form-group radio-group">
                        <p>Message Purpose</p>
                        <label>
                            <input type="radio" name="purpose" value="general" checked> General Inquiry
                        </label>
                        <label>
                            <input type="radio" name="purpose" value="reservation"> Reservation Question
                        </label>
                        <label>
                            <input type="radio" name="purpose" value="suggestion"> Website Suggestion
                        </label>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="Type here" required></textarea>
                    </div>

                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" name="subscribe" value="yes" checked> Please Subscribe me to the
                            monthly newsletter
                        </label>
                    </div>

                    <button type="submit">Get in Touch!</button>
                </form>
            </div>
        </section>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-grid">
                <figure>
                    <img src="images/john.jpg" alt="John Simboti - Lead Guide">
                    <figcaption>Senior River Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/jane.jpg" alt="Jane Shumba - Safety Officer">
                    <figcaption>Safety & Operations Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/client1.jpg" alt="Bob Johnson - Customer Relations">
                    <figcaption>Customer Experience Manager</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; Zimbabwe 2026 White Water Rafting Adventures | Nyasha Chimutapira</p>
            <nav class="socialmedia">
                <a href="https://facebook.com">
                    <img src="images/facebook.svg" alt="Facebook Icon">
                </a>
                <a href="https://linkedin.com">
                    <img src="images/linkedin.svg" alt="LinkedIn Icon">
                </a>
                <a href="https://instagram.com">
                    <img src="images/instagram.svg" alt="Instagram Icon">
                </a>
            </nav>
        </div>
    </footer>
</body>

</html>
